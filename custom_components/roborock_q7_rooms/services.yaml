clean_segments:
  name: Clean Segments
  description: Start room cleaning for specific room IDs on the Q7.
  fields:
    device:
      name: Device
      description: Name of the Q7 device (optional if you only have one Q7).
      required: false
      example: "Staubsauger Obergeschoss"
      selector:
        text:
    segments:
      name: Segments
      description: List of room IDs to clean.
      required: true
      example: "[12, 13]"
      selector:
        object:
    repeat:
      name: Repeat
      description: Number of times to repeat cleaning.
      default: 1
      selector:
        number:
          min: 1
          max: 3
          mode: box

stop:
  name: Stop
  description: Stop the Q7 vacuum.
  fields:
    device:
      name: Device
      description: Name of the Q7 device (optional if you only have one Q7).
      required: false
      selector:
        text:

dock:
  name: Dock
  description: Send the Q7 vacuum back to its dock.
  fields:
    device:
      name: Device
      description: Name of the Q7 device (optional if you only have one Q7).
      required: false
      selector:
        text:
